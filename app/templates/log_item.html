<li id="log-item-{{ item.log_id }}" class="px-5 py-3.5 flex justify-between items-center gap-3 hover:bg-slate-800/10 transition-colors duration-150">
    <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2">
            <span class="font-semibold text-slate-200 text-sm truncate">{{ item.name }}</span>
            <span class="text-[10px] text-slate-500 font-medium px-2 py-0.5 bg-slate-900 rounded-full border border-slate-850 shrink-0">
                {{ item.time }}
            </span>
        </div>
        <div class="mt-1 flex items-center gap-2 text-xs text-slate-400">
            <span>Qty: <strong class="text-slate-300">
                {{ item.quantity | int if item.quantity == item.quantity | int else item.quantity }}
            </strong>{{ item.unit }}</span>
            <span class="text-slate-600">•</span>
            <span class="flex gap-2">
                <span class="text-emerald-500/90 font-medium">P: {{ item.protein }}g</span>
                <span class="text-amber-500/90 font-medium">C: {{ item.carbs }}g</span>
                <span class="text-rose-500/90 font-medium">F: {{ item.fat }}g</span>
            </span>
        </div>
    </div>
    <div class="flex items-center gap-2 shrink-0">
        <span class="font-bold text-slate-100 text-sm sm:text-base mr-1">
            {{ item.calories }} <span class="text-xs text-slate-450 font-normal">kcal</span>
        </span>
        <!-- Edit Button -->
        <button 
            hx-get="log/{{ item.log_id }}/edit?date={{ selected_date }}"
            hx-target="#log-item-{{ item.log_id }}"
            hx-swap="outerHTML"
            class="text-slate-500 hover:text-indigo-400 hover:bg-indigo-500/10 p-2 rounded-lg transition-all duration-150 border border-transparent hover:border-indigo-500/20"
            title="Edit Log"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
        </button>
        <!-- Delete Button -->
        <button 
            hx-delete="log/{{ item.log_id }}?date={{ selected_date }}"
            hx-target="#history-panel"
            hx-swap="innerHTML"
            class="text-slate-500 hover:text-rose-450 hover:bg-rose-500/10 p-2 rounded-lg transition-all duration-150 border border-transparent hover:border-rose-500/20"
            title="Delete Log"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </div>
</li>
