<li id="log-item-{{ item.log_id }}" class="px-5 py-3.5 hover:bg-slate-800/10 transition-colors duration-150">
    <form hx-post="log/{{ item.log_id }}/edit?date={{ selected_date }}" hx-target="#history-panel" hx-swap="innerHTML" class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 w-full">
        <div class="min-w-0 flex-1">
            <div class="flex items-center gap-2">
                <span class="font-semibold text-slate-200 text-sm truncate">{{ item.name }}</span>
                <span class="text-[10px] text-slate-500 font-medium px-2 py-0.5 bg-slate-900 rounded-full border border-slate-850 shrink-0">
                    {{ item.time }}
                </span>
            </div>
            <div class="mt-2 flex items-center gap-2">
                <label class="text-xs text-slate-450 font-medium">Quantity ({{ item.unit }}):</label>
                <input 
                    type="number" 
                    name="quantity" 
                    value="{{ item.quantity }}" 
                    step="any" 
                    min="0.01" 
                    required
                    class="w-24 px-2.5 py-1.5 rounded-lg bg-slate-950 border border-slate-850 text-slate-200 text-xs focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all duration-150"
                >
            </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <!-- Save Button -->
            <button 
                type="submit" 
                class="text-emerald-400 hover:text-emerald-300 hover:bg-emerald-500/10 p-2 rounded-lg transition-all duration-150 border border-transparent hover:border-emerald-500/20"
                title="Save Changes"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </button>
            <!-- Cancel Button -->
            <button 
                type="button"
                hx-get="log/{{ item.log_id }}/normal?date={{ selected_date }}"
                hx-target="#log-item-{{ item.log_id }}"
                hx-swap="outerHTML"
                class="text-slate-500 hover:text-slate-400 hover:bg-slate-800/50 p-2 rounded-lg transition-all duration-150 border border-transparent"
                title="Cancel Edit"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </form>
</li>
